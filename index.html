<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyberpunk Earning Hub</title>
    <style>
        :root {
            --bg: #0B0B1E;
            --cyan: #00f3ff;
            --green: #00ff66;
            --red: #ff4d4d;
            --purple: #b300ff;
            --dark: #111133;
            --card: #151530;
            --text: #e0e0ff;
            --glow-cyan: 0 0 20px rgba(0, 243, 255, 0.4);
            --glow-green: 0 0 20px rgba(0, 255, 102, 0.4);
            --glow-red: 0 0 20px rgba(255, 77, 77, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Segoe UI', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0, 243, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(179, 0, 255, 0.06) 0%, transparent 60%);
        }

        /* Header */
        .header {
            width: 100%;
            padding: 18px 20px;
            text-align: center;
            border-bottom: 2px solid var(--cyan);
            box-shadow: var(--glow-cyan);
            background: rgba(11, 11, 30, 0.97);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header h1 {
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            letter-spacing: 3px;
        }
        .header .subtitle {
            font-size: 0.72rem;
            color: var(--purple);
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 14px;
            width: 100%;
            max-width: 500px;
        }
        .stat-item {
            background: var(--card);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 11px 16px;
            text-align: center;
            min-width: 78px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.12);
            transition: all 0.3s ease;
        }
        .stat-item.updated {
            border-color: var(--green);
            box-shadow: var(--glow-green);
        }
        .stat-value {
            font-size: 1.35rem;
            font-weight: bold;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            transition: all 0.4s ease;
        }
        .stat-label {
            font-size: 0.63rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 10px 15px 40px;
            flex: 1;
        }

        /* ==================== SPIN WHEEL ==================== */
        #spinMode {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        #spinMode.active { display: flex; }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 8px auto;
        }
        canvas#spinCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow:
                0 0 40px rgba(0, 243, 255, 0.3),
                0 0 80px rgba(179, 0, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--cyan);
        }
        .spin-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid var(--red);
            filter: drop-shadow(0 0 8px var(--red));
            z-index: 10;
        }

        /* ==================== ADS MODE ==================== */
        #adsMode {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        #adsMode.active { display: flex; }

        /* Ad Box - the zone where ad iframe loads */
        .ad-zone {
            width: 100%;
            min-height: 310px;
            background: var(--card);
            border: 2px solid var(--cyan);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* "Click to Load Ad" button - shown before ad loads */
        .load-ad-btn {
            background: linear-gradient(135deg, rgba(0,243,255,0.15), rgba(179,0,255,0.15));
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 18px 30px;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: var(--glow-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .load-ad-btn:hover {
            background: rgba(0, 243, 255, 0.25);
            transform: scale(1.03);
        }
        .load-ad-btn .btn-icon { font-size: 2.2rem; }
        .load-ad-btn .btn-sub { font-size: 0.72rem; color: var(--purple); letter-spacing: 2px; }

        /* Countdown overlay - appears after ad loads */
        .countdown-overlay {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(11, 11, 30, 0.88);
            border: 2px solid var(--red);
            border-radius: 50%;
            width: 54px;
            height: 54px;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--red);
            text-shadow: 0 0 10px var(--red);
            z-index: 20;
            box-shadow: var(--glow-red);
            transition: all 0.3s ease;
        }
        .countdown-overlay.visible { display: flex; }
        .countdown-overlay.done {
            border-color: var(--green);
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            box-shadow: var(--glow-green);
            font-size: 1.6rem;
            cursor: pointer;
            animation: pulse-close 1s infinite;
        }
        @keyframes pulse-close {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* Ad script container - injected Monetag will render here */
        #monetagContainer {
            display: none;
            width: 100%;
            min-height: 300px;
            align-items: center;
            justify-content: center;
        }
        #monetagContainer.visible { display: flex; }

        /* Ad loading state */
        .ad-loading-state {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: var(--cyan);
        }
        .ad-loading-state.visible { display: flex; }
        .ad-loading-state p { font-size: 0.8rem; opacity: 0.75; }

        /* Buttons */
        .btn {
            padding: 14px 35px;
            border: 2px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            width: 100%;
        }
        .btn:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.12);
            box-shadow: var(--glow-cyan);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .btn-green {
            border-color: var(--green);
            color: var(--green);
        }
        .btn-green:hover:not(:disabled) {
            background: rgba(0, 255, 102, 0.12);
            box-shadow: var(--glow-green);
        }
        .btn-green.active-glow {
            animation: btn-pulse 1.4s infinite;
            box-shadow: var(--glow-green);
        }
        @keyframes btn-pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(0,255,102,0.3); }
            50% { box-shadow: 0 0 28px rgba(0,255,102,0.8); }
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--dark);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--green);
        }

        /* Info text */
        .info-text {
            text-align: center;
            font-size: 0.78rem;
            color: var(--cyan);
            opacity: 0.85;
        }
        .info-text span { color: var(--green); font-weight: bold; }

        /* Loading spinner */
        .loader {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(0, 243, 255, 0.2);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin-loader 0.85s linear infinite;
        }
        @keyframes spin-loader { to { transform: rotate(360deg); } }

        /* Status message */
        .status-msg {
            text-align: center;
            font-size: 0.82rem;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
        }
        .status-msg.success {
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }
        .status-msg.error {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }
        .status-msg.info {
            background: rgba(0, 243, 255, 0.08);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: var(--cyan);
        }

        /* Result Popup */
        .result-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--dark);
            border: 2px solid var(--green);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 0 70px rgba(0, 255, 102, 0.4);
            min-width: 270px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-popup.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-popup .coin-amount {
            font-size: 3.2rem;
            color: var(--green);
            text-shadow: 0 0 25px var(--green);
            font-weight: bold;
        }
        .result-popup .result-label {
            color: var(--cyan);
            margin: 10px 0 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .result-popup .emoji-big { font-size: 2.2rem; margin-bottom: 8px; display: block; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 199;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: block; }

        /* Responsive */
        @media (max-width: 380px) {
            .wheel-container { width: 255px; height: 255px; }
            .header h1 { font-size: 1.25rem; }
            .btn { padding: 12px 22px; font-size: 0.92rem; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1>⚡ CYBERPUNK HUB ⚡</h1>
    <div class="subtitle">Earn • Spin • Compete</div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="stat-item" id="coinStat">
        <div class="stat-value" id="coinDisplay">—</div>
        <div class="stat-label">🪙 COINS</div>
    </div>
    <div class="stat-item" id="adStat">
        <div class="stat-value" id="adDisplay">—</div>
        <div class="stat-label">📺 ADS</div>
    </div>
    <div class="stat-item" id="streakStat">
        <div class="stat-value" id="streakDisplay">—</div>
        <div class="stat-label">🔥 STREAK</div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-container">

    <!-- ===== SPIN WHEEL MODE ===== -->
    <div id="spinMode">
        <div class="wheel-container">
            <div class="spin-pointer"></div>
            <canvas id="spinCanvas" width="300" height="300"></canvas>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="streakProgress" style="width: 14%;"></div>
        </div>
        <div class="info-text" id="streakInfo">🔥 Streak: Day 1 of 7</div>
        <button class="btn btn-green" id="spinButton" onclick="startSpin()">🎰 SPIN NOW</button>
        <div id="spinStatus" class="status-msg info" style="display:none;"></div>
    </div>

    <!-- ===== ADS MODE ===== -->
    <div id="adsMode">
        <div class="info-text" id="adsTitle">📺 Daily Ads</div>
        <div class="progress-bar">
            <div class="progress-fill" id="adsProgress" style="width: 0%;"></div>
        </div>
        <div class="info-text" id="adsRemaining">Loading...</div>

        <!-- Ad Zone Box -->
        <div class="ad-zone" id="adZone">

            <!-- Step 1: "Click to Load Ad" button (default state) -->
            <button class="load-ad-btn" id="loadAdBtn" onclick="loadAd()">
                <span class="btn-icon">🎬</span>
                <span>Click to Load & Watch Ad</span>
                <span class="btn-sub">+30 to +50 COINS REWARD</span>
            </button>

            <!-- Step 2: Loading spinner (shown while script injects) -->
            <div class="ad-loading-state" id="adLoadingState">
                <div class="loader"></div>
                <p>Loading advertisement...</p>
            </div>

            <!-- Step 3: Monetag ad renders here -->
            <div id="monetagContainer"></div>

            <!-- Countdown / X button (floats top-right) -->
            <div class="countdown-overlay" id="countdownOverlay" onclick="handleCountdownClick()">
                <span id="countdownNum">15</span>
            </div>
        </div>

        <!-- Claim Reward Button -->
        <button class="btn btn-green" id="adCompleteBtn" onclick="claimAdReward()" disabled>
            ✅ I WATCHED THE AD
        </button>

        <div id="adStatusMsg" class="status-msg" style="display:none;"></div>
    </div>

</div>

<!-- RESULT POPUP -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="result-popup" id="resultPopup">
    <span class="emoji-big" id="resultEmoji">🎉</span>
    <div class="coin-amount" id="resultAmount">+50</div>
    <div class="result-label" id="resultMsg">COINS EARNED!</div>
    <button class="btn btn-green" onclick="closePopup()">🚀 CONTINUE</button>
</div>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const BACKEND_URL = 'https://earning-n0t3.onrender.com';

const CONFIG = {
    mode: 'spin',       // 'spin' | 'ads' | 'sunday'
    userId: '',
    spinMode: 'normal', // 'normal' | 'mega'
    streak: 0
};

// ============================================================
// INIT — Telegram WebApp + URL Params
// ============================================================
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

// ✅ FIX: Parse URL params safely
(function parseParams() {
    const params = new URLSearchParams(window.location.search);
    CONFIG.mode     = params.get('mode')     || 'spin';
    CONFIG.userId   = params.get('userId')   || '';
    CONFIG.spinMode = params.get('spinMode') || 'normal';
    CONFIG.streak   = parseInt(params.get('streak') || '0', 10);
    console.log('⚡ Config:', CONFIG);
})();

// ============================================================
// SPIN WHEEL DATA
// ============================================================
const normalSegments = [
    { label: '10', value: 10,  color: '#00f3ff' },
    { label: '25', value: 25,  color: '#b300ff' },
    { label: '50', value: 50,  color: '#ff4d4d' },
    { label: '15', value: 15,  color: '#00ff66' },
    { label: '30', value: 30,  color: '#ffaa00' },
    { label: '75', value: 75,  color: '#ff00aa' },
    { label: '20', value: 20,  color: '#00f3ff' },
    { label: '40', value: 40,  color: '#b300ff' },
];
const megaSegments = [
    { label: '100', value: 100,  color: '#00f3ff' },
    { label: '200', value: 200,  color: '#ffaa00' },
    { label: '500', value: 500,  color: '#ff4d4d' },
    { label: '75',  value: 75,   color: '#b300ff' },
    { label: '150', value: 150,  color: '#00ff66' },
    { label: '750', value: 750,  color: '#ff00aa' },
    { label: '80',  value: 80,   color: '#00f3ff' },
    { label: '300', value: 300,  color: '#ffaa00' },
];

let currentSegments = CONFIG.spinMode === 'mega' ? megaSegments : normalSegments;
let isSpinning = false;
let currentRotation = 0;
let spinCanvas, spinCtx;

// ============================================================
// MAIN INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    if (CONFIG.mode === 'spin') {
        document.getElementById('spinMode').classList.add('active');
        setupSpinWheel();
        updateStreakUI();
    } else {
        // ads or sunday
        document.getElementById('adsMode').classList.add('active');
        setupAdsMode();
    }
    fetchUserStats();
});

// ============================================================
// FETCH USER STATS (fills top counters)
// ============================================================
async function fetchUserStats() {
    if (!CONFIG.userId) return;
    try {
        const res = await fetch(`${BACKEND_URL}/api/user/${CONFIG.userId}`);
        const data = await res.json();
        if (data.user) {
            const u = data.user;
            animateStat('coinDisplay', u.coins);
            animateStat('streakDisplay', u.spinStreak);
            const adCount = CONFIG.mode === 'sunday' ? u.sundayAdsCount : u.dailyAdsViewed;
            animateStat('adDisplay', adCount);
            updateAdsProgressBar(adCount);
        }
    } catch (e) {
        console.log('Stats fetch failed, using defaults.');
    }
}

function animateStat(id, newVal) {
    const el = document.getElementById(id);
    const parent = el.closest('.stat-item');
    el.textContent = newVal;
    parent.classList.add('updated');
    setTimeout(() => parent.classList.remove('updated'), 1200);
}

// ============================================================
// SPIN WHEEL
// ============================================================
function setupSpinWheel() {
    spinCanvas = document.getElementById('spinCanvas');
    spinCtx    = spinCanvas.getContext('2d');
    drawWheel(0);
}

function drawWheel(rotation) {
    const c  = spinCanvas;
    const cx = spinCtx;
    const W  = c.width, H = c.height;
    const cx2 = W / 2, cy2 = H / 2;
    const radius = W / 2 - 10;
    const segs = currentSegments;
    const angPer = (2 * Math.PI) / segs.length;

    cx.clearRect(0, 0, W, H);

    segs.forEach((seg, i) => {
        const sA = rotation + i * angPer;
        const eA = sA + angPer;

        cx.beginPath();
        cx.moveTo(cx2, cy2);
        cx.arc(cx2, cy2, radius, sA, eA);
        cx.closePath();

        const grad = cx.createRadialGradient(cx2, cy2, 0, cx2, cy2, radius);
        grad.addColorStop(0.2, seg.color + 'cc');
        grad.addColorStop(1, '#0B0B1E');
        cx.fillStyle = grad;
        cx.fill();

        cx.strokeStyle = '#0B0B1E';
        cx.lineWidth = 2;
        cx.stroke();

        // Label
        cx.save();
        cx.translate(cx2, cy2);
        cx.rotate(sA + angPer / 2);
        cx.textAlign = 'right';
        cx.fillStyle = '#ffffff';
        cx.font = 'bold 17px "Courier New", monospace';
        cx.shadowColor = seg.color;
        cx.shadowBlur = 8;
        cx.fillText(seg.label, radius - 22, 7);
        cx.restore();
    });

    // Centre hub
    const hub = cx.createRadialGradient(cx2, cy2, 4, cx2, cy2, 28);
    hub.addColorStop(0, '#ffffff');
    hub.addColorStop(1, '#0B0B1E');
    cx.beginPath();
    cx.arc(cx2, cy2, 28, 0, 2 * Math.PI);
    cx.fillStyle = hub;
    cx.fill();
    cx.strokeStyle = '#00f3ff';
    cx.lineWidth = 3;
    cx.stroke();

    cx.fillStyle = '#00f3ff';
    cx.font = 'bold 13px "Courier New", monospace';
    cx.textAlign = 'center';
    cx.fillText('SPIN', cx2, cy2 + 5);
}

function updateStreakUI() {
    const streak  = CONFIG.streak;
    const dayNum  = Math.min((streak % 7) + 1, 7);
    const pct     = (dayNum / 7) * 100;
    document.getElementById('streakProgress').style.width = pct + '%';
    document.getElementById('streakInfo').textContent =
        `🔥 Streak: Day ${dayNum} of 7${CONFIG.spinMode === 'mega' ? ' — MEGA SPIN! 🌟' : ''}`;
    document.getElementById('streakDisplay').textContent = streak;
}

function startSpin() {
    if (isSpinning) return;
    isSpinning = true;

    const btn = document.getElementById('spinButton');
    btn.disabled = true;
    btn.textContent = '🌀 SPINNING...';
    document.getElementById('spinStatus').style.display = 'none';

    const segs      = currentSegments;
    const angPer    = 360 / segs.length;
    const winIdx    = Math.floor(Math.random() * segs.length);
    const fullSpins = 5 + Math.floor(Math.random() * 4);
    const totalDeg  = fullSpins * 360 + winIdx * angPer + angPer / 2;
    const totalRad  = totalDeg * (Math.PI / 180);
    const startRot  = currentRotation;
    const duration  = 4200 + Math.random() * 1800;
    const startTime = performance.now();

    function animate(now) {
        const elapsed  = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased    = 1 - Math.pow(1 - progress, 3);
        const angle    = startRot + totalRad * eased;

        drawWheel(angle);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            currentRotation = angle;
            // Find winner segment
            const norm   = ((angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            const segIdx = Math.floor(((2 * Math.PI - norm) / (2 * Math.PI)) * segs.length) % segs.length;
            const winner = segs[segIdx >= 0 ? segIdx : segIdx + segs.length];

            submitReward('spin', winner.value, (data) => {
                animateStat('coinDisplay', data.totalCoins);
                animateStat('streakDisplay', data.spinStreak);
                showPopup(winner.value, CONFIG.spinMode === 'mega');
                btn.disabled    = false;
                btn.textContent = '🎰 SPIN NOW';
                isSpinning      = false;
            }, (err) => {
                showStatus('spinStatus', '❌ ' + (err || 'Failed to save. Try again.'), 'error');
                btn.disabled    = false;
                btn.textContent = '🎰 SPIN NOW';
                isSpinning      = false;
            });
        }
    }
    requestAnimationFrame(animate);
}

// ============================================================
// ADS MODE
// ============================================================
let countdownInterval = null;
let adWatched         = false;  // set true after 15s
let adLoaded          = false;  // set true after script injected

function setupAdsMode() {
    const isSunday = CONFIG.mode === 'sunday';
    document.getElementById('adsTitle').textContent =
        isSunday ? '🏆 Sunday Tournament Ads' : '📺 Daily Ads (Mon–Sat)';
    document.getElementById('adsRemaining').textContent =
        isSunday ? 'Earn 30–50 coins per ad · Max 20 free' : 'Earn 30–50 coins per ad · Max 10/day';
}

function updateAdsProgressBar(current) {
    const total = CONFIG.mode === 'sunday' ? 20 : 10;
    const pct   = Math.min((current / total) * 100, 100);
    document.getElementById('adsProgress').style.width = pct + '%';
    document.getElementById('adDisplay').textContent = current;
    document.getElementById('adsRemaining').textContent =
        `Watched: ${current}/${total} · Earn 30–50 coins per ad`;
}

// ============================================================
// STEP 1 — User clicks "Click to Load Ad" button
// ============================================================
function loadAd() {
    if (adLoaded) return;
    adLoaded = true;

    // Hide the load button
    document.getElementById('loadAdBtn').style.display = 'none';

    // Show loading spinner
    const loadingState = document.getElementById('adLoadingState');
    loadingState.classList.add('visible');

    // ✅ Dynamically inject Monetag script (NOT auto-loaded)
    const script    = document.createElement('script');
    script.src      = 'https://alwingulla.com/88/ed/3a/88ed3af23992b45e7f7889cb9c02cbba.js';
    script.async    = true;
    script.setAttribute('data-cfasync', 'false');

    script.onload = () => {
        // Script loaded — hide spinner, show ad container
        loadingState.classList.remove('visible');
        const container = document.getElementById('monetagContainer');
        container.classList.add('visible');

        // Start 15-second countdown
        startCountdown();
    };

    script.onerror = () => {
        // Script failed — still start countdown so user isn't stuck
        loadingState.classList.remove('visible');
        const container = document.getElementById('monetagContainer');
        container.classList.add('visible');
        container.innerHTML =
            '<div style="text-align:center;color:var(--cyan);padding:20px;font-size:0.85rem;opacity:0.7;">' +
            '📺 Ad is playing...<br><small>Please wait for the timer.</small></div>';
        startCountdown();
    };

    document.getElementById('monetagContainer').appendChild(script);
}

// ============================================================
// STEP 2 — 15 second countdown → X button appears
// ============================================================
function startCountdown() {
    let seconds = 15;
    const overlay  = document.getElementById('countdownOverlay');
    const numEl    = document.getElementById('countdownNum');

    overlay.classList.add('visible');
    numEl.textContent = seconds;

    countdownInterval = setInterval(() => {
        seconds--;
        if (seconds > 0) {
            numEl.textContent = seconds;
        } else {
            clearInterval(countdownInterval);
            countdownInterval = null;
            adWatched         = true;

            // ✅ Change to clickable X button
            overlay.classList.add('done');
            numEl.textContent = '✕';

            // Enable claim button
            const claimBtn = document.getElementById('adCompleteBtn');
            claimBtn.disabled = false;
            claimBtn.classList.add('active-glow');

            showAdStatus('✅ Ad watched! Click "I WATCHED THE AD" to claim your coins.', 'success');
        }
    }, 1000);
}

// ============================================================
// STEP 3 — X click → redirect to ads page (fresh ad)
// ============================================================
function handleCountdownClick() {
    if (!adWatched) return; // Ignore if countdown not done

    // Redirect to same page → triggers a fresh ad cycle
    // This simulates "going to ads page again"
    window.location.href =
        `${window.location.pathname}?mode=${CONFIG.mode}&userId=${CONFIG.userId}&t=${Date.now()}`;
}

// ============================================================
// STEP 4 — "I WATCHED THE AD" → send reward to backend
// ============================================================
function claimAdReward() {
    if (!adWatched) return;

    const btn = document.getElementById('adCompleteBtn');
    btn.disabled    = true;
    btn.textContent = '⏳ SAVING COINS...';
    btn.classList.remove('active-glow');

    // Random reward 30–50
    const reward = Math.floor(Math.random() * 21) + 30;
    const type   = CONFIG.mode === 'sunday' ? 'sunday' : 'ad';

    submitReward(type, reward, (data) => {
        animateStat('coinDisplay', data.totalCoins);
        const newAdCount = data.dailyAdsViewed ?? data.sundayAdsCount ?? 0;
        updateAdsProgressBar(newAdCount);
        showPopup(data.reward || reward, false);

        // Reset for next ad
        adWatched = false;
        adLoaded  = false;
        btn.textContent = '✅ I WATCHED THE AD';
        btn.disabled    = true;

        // Reset ad zone for next watch
        setTimeout(resetAdZone, 2000);
    }, (err) => {
        btn.disabled    = false;
        btn.textContent = '✅ I WATCHED THE AD';
        btn.classList.add('active-glow');

        if (err && err.includes('limit')) {
            showAdStatus('🛑 Daily limit reached! Come back tomorrow.', 'error');
            btn.disabled    = true;
            btn.textContent = '🛑 LIMIT REACHED';
            btn.classList.remove('active-glow');
        } else {
            showAdStatus('❌ ' + (err || 'Network error. Try again.'), 'error');
        }
    });
}

function resetAdZone() {
    clearInterval(countdownInterval);
    adWatched = false;
    adLoaded  = false;

    // Reset overlay
    const overlay = document.getElementById('countdownOverlay');
    overlay.classList.remove('visible', 'done');
    document.getElementById('countdownNum').textContent = '15';

    // Reset containers
    document.getElementById('monetagContainer').classList.remove('visible');
    document.getElementById('monetagContainer').innerHTML = '';
    document.getElementById('adLoadingState').classList.remove('visible');

    // Show load button again
    document.getElementById('loadAdBtn').style.display = 'flex';

    // Reset claim button
    const btn = document.getElementById('adCompleteBtn');
    btn.disabled    = true;
    btn.textContent = '✅ I WATCHED THE AD';
    btn.classList.remove('active-glow');

    showAdStatus('🎬 Click above to watch another ad!', 'info');
}

function showAdStatus(msg, type) {
    const el = document.getElementById('adStatusMsg');
    el.textContent = msg;
    el.className   = `status-msg ${type}`;
    el.style.display = 'block';
}

// ============================================================
// ✅ UNIVERSAL REWARD SUBMIT → POST /api/reward
// ============================================================
async function submitReward(type, coins, onSuccess, onError) {
    if (!CONFIG.userId) {
        onError('User ID not found. Please reopen from Telegram.');
        return;
    }
    try {
        const res = await fetch(`${BACKEND_URL}/api/reward`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: CONFIG.userId,
                coins:  coins,
                type:   type   // 'ad' | 'spin' | 'sunday'
            })
        });

        const data = await res.json();

        if (res.ok && data.success) {
            onSuccess(data);
        } else {
            const errMsg = data.error || `Server error (${res.status})`;
            onError(errMsg);
        }
    } catch (e) {
        console.error('submitReward error:', e);
        onError('Network error. Check connection.');
    }
}

// ============================================================
// UI HELPERS
// ============================================================
function showPopup(amount, isMega) {
    document.getElementById('resultEmoji').textContent  = isMega ? '🔥' : '🎉';
    document.getElementById('resultAmount').textContent = '+' + amount;
    document.getElementById('resultMsg').textContent    = isMega ? 'MEGA SPIN COINS!' : 'COINS EARNED!';
    document.getElementById('resultPopup').classList.add('show');
    document.getElementById('overlay').classList.add('show');
}

function closePopup() {
    document.getElementById('resultPopup').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
}

function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className   = `status-msg ${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
}
</script>
