<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyberpunk Earning Hub | Neon Rewards</title>
    <!-- Monetag Rewarded Interstitial SDK -->
    <script src="https://alwingulla.com/88/ed/3a/88ed3af23992b45e7f7889cb9c02cbba.js" async></script>
    <style>
        :root {
            --bg: #0B0B1E;
            --cyan: #00f3ff;
            --green: #00ff66;
            --red: #ff4d4d;
            --purple: #b300ff;
            --dark: #111133;
            --card: #151530;
            --text: #e0e0ff;
            --glow-cyan: 0 0 20px rgba(0, 243, 255, 0.4);
            --glow-green: 0 0 20px rgba(0, 255, 102, 0.4);
            --glow-red: 0 0 20px rgba(255, 77, 77, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Segoe UI', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0, 243, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(179, 0, 255, 0.06) 0%, transparent 60%);
        }

        /* Header */
        .header {
            width: 100%;
            padding: 18px 20px;
            text-align: center;
            border-bottom: 2px solid var(--cyan);
            box-shadow: var(--glow-cyan);
            background: rgba(11, 11, 30, 0.97);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header h1 {
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            letter-spacing: 3px;
        }
        .header .subtitle {
            font-size: 0.72rem;
            color: var(--purple);
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 14px;
            width: 100%;
            max-width: 500px;
        }
        .stat-item {
            background: var(--card);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 11px 16px;
            text-align: center;
            min-width: 78px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.12);
            transition: all 0.3s ease;
        }
        .stat-item.updated {
            border-color: var(--green);
            box-shadow: var(--glow-green);
        }
        .stat-value {
            font-size: 1.35rem;
            font-weight: bold;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            transition: all 0.4s ease;
        }
        .stat-label {
            font-size: 0.63rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 10px 15px 40px;
            flex: 1;
        }

        /* ==================== SPIN WHEEL MODE ==================== */
        #spinMode {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        #spinMode.active { display: flex; }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 8px auto;
        }
        canvas#spinCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow:
                0 0 40px rgba(0, 243, 255, 0.3),
                0 0 80px rgba(179, 0, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--cyan);
        }
        .spin-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid var(--red);
            filter: drop-shadow(0 0 8px var(--red));
            z-index: 10;
        }

        /* ==================== ADS MODE ==================== */
        #adsMode {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        #adsMode.active { display: flex; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--dark);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0 4px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--green);
        }

        .info-text {
            text-align: center;
            font-size: 0.78rem;
            color: var(--cyan);
            opacity: 0.85;
        }
        .info-text span { color: var(--green); font-weight: bold; }

        /* 🟥 CYBERPUNK RED GLOWING BUTTON */
        .watch-ads-btn {
            background: linear-gradient(135deg, #ff1a1a, #990000);
            border: none;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 3px;
            padding: 22px 20px;
            width: 100%;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px #ff4d4d, 0 0 8px #ff0000 inset;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            backdrop-filter: blur(2px);
        }
        .watch-ads-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px #ff4d4d, 0 0 12px #ff0000 inset;
        }
        .watch-ads-btn:disabled {
            opacity: 0.6;
            transform: scale(0.98);
            cursor: not-allowed;
            filter: grayscale(0.2);
        }
        .watch-ads-btn .btn-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px gold);
        }

        /* Coin Flying Animation Elements */
        .flying-coin {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: flyUpCoin 1.2s ease-out forwards;
            filter: drop-shadow(0 0 6px gold);
        }
        @keyframes flyUpCoin {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            30% {
                transform: translate(calc(var(--rx, -15px) * 0.8), calc(var(--ry, -40px) * 0.6)) scale(1.2) rotate(25deg);
            }
            70% {
                opacity: 0.9;
                transform: translate(calc(var(--tx, -80px)), calc(var(--ty, -180px))) scale(1.1) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--tx, -100px)), calc(var(--ty, -250px))) scale(0.6) rotate(360deg);
            }
        }

        /* Status messages */
        .status-msg {
            text-align: center;
            font-size: 0.82rem;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
        }
        .status-msg.success {
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }
        .status-msg.error {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }
        .status-msg.info {
            background: rgba(0, 243, 255, 0.08);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: var(--cyan);
        }

        /* result popup (shared) */
        .result-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--dark);
            border: 2px solid var(--green);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 0 70px rgba(0, 255, 102, 0.4);
            min-width: 270px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-popup.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-popup .coin-amount {
            font-size: 3.2rem;
            color: var(--green);
            text-shadow: 0 0 25px var(--green);
            font-weight: bold;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 199;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: block; }
        .btn-green {
            border-color: var(--green);
            color: var(--green);
            background: transparent;
            padding: 12px 28px;
            font-family: monospace;
            font-weight: bold;
            border: 2px solid;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 16px;
        }

        @media (max-width: 380px) {
            .wheel-container { width: 255px; height: 255px; }
            .watch-ads-btn { font-size: 1.3rem; padding: 18px 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⚡ CYBERPUNK HUB ⚡</h1>

</div>

<div class="stats-bar">
    <div class="stat-item" id="coinStat">
        <div class="stat-value" id="coinDisplay">—</div>

    </div>

<div class="main-container">
    <!-- SPIN WHEEL MODE (unchanged, fully operational) -->
    <div id="spinMode">
        <div class="wheel-container">
            <div class="spin-pointer"></div>
            <canvas id="spinCanvas" width="300" height="300"></canvas>
        </div>

    </div>

    <!-- ADS MODE (COMPLETELY REDESIGNED with RED button + Monetag) -->
    <div id="adsMode">

        <div class="progress-bar">

        <!-- CYBERPUNK RED GLOWING BUTTON (single, prominent) -->

<!-- RESULT POPUP (shared) -->

    <span class="emoji-big" id="resultEmoji">🎉</span>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // ============================================================
    // GLOBALS & CONFIGURATION (preserved from original)
    // ============================================================
    const BACKEND_URL = 'https://earning-n0t3.onrender.com';
    let CONFIG = {
        mode: 'spin',       // 'spin' or 'ads'
        userId: '',
        spinMode: 'normal',
        streak: 0
    };

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    // Parse URL parameters
    (function parseParams() {
        const params = new URLSearchParams(window.location.search);
        CONFIG.mode     = params.get('mode')     || 'spin';
        CONFIG.userId   = params.get('userId')   || '';
        CONFIG.spinMode = params.get('spinMode') || 'normal';
        CONFIG.streak   = parseInt(params.get('streak') || '0', 10);
    })();

    // ========== SPIN WHEEL DATA (untouched, fully working) ==========
    const normalSegments = [
        { label: '10', value: 10,  color: '#00f3ff' }, { label: '25', value: 25,  color: '#b300ff' },
        { label: '50', value: 50,  color: '#ff4d4d' }, { label: '15', value: 15,  color: '#00ff66' },
        { label: '30', value: 30,  color: '#ffaa00' }, { label: '75', value: 75,  color: '#ff00aa' },
        { label: '20', value: 20,  color: '#00f3ff' }, { label: '40', value: 40,  color: '#b300ff' },
    ];
    const megaSegments = [
        { label: '100', value: 100, color: '#00f3ff' }, { label: '200', value: 200, color: '#ffaa00' },
        { label: '500', value: 500, color: '#ff4d4d' }, { label: '75',  value: 75,  color: '#b300ff' },
        { label: '150', value: 150, color: '#00ff66' }, { label: '750', value: 750, color: '#ff00aa' },
        { label: '80',  value: 80,  color: '#00f3ff' }, { label: '300', value: 300, color: '#ffaa00' },
    ];
    let currentSegments = CONFIG.spinMode === 'mega' ? megaSegments : normalSegments;
    let isSpinning = false;
    let currentRotation = 0;
    let spinCanvas, spinCtx;

    // ========== DOM READY ==========
    document.addEventListener('DOMContentLoaded', () => {
        if (CONFIG.mode === 'spin') {
            document.getElementById('spinMode').classList.add('active');
            setupSpinWheel();
            updateStreakUI();
        } else {
            document.getElementById('adsMode').classList.add('active');
            setupAdsUI();
        }
        fetchUserStats();
    });

    // ========== FETCH USER STATS (coins, ads count, streak) ==========
    async function fetchUserStats() {
        if (!CONFIG.userId) return;
        try {
            const res = await fetch(`${BACKEND_URL}/api/user/${CONFIG.userId}`);
            const data = await res.json();
            if (data.user) {
                const u = data.user;
                animateStat('coinDisplay', u.coins);
                animateStat('streakDisplay', u.spinStreak);
                const adCount = u.dailyAdsViewed || 0;
                animateStat('adDisplay', adCount);
                updateAdsProgressBar(adCount);
                CONFIG.streak = u.spinStreak;
                if (CONFIG.mode === 'spin') updateStreakUI();
            }
        } catch (e) { console.log("Stats fetch", e); }
    }

    function animateStat(id, newVal) {
        const el = document.getElementById(id);
        if (!el) return;
        const parent = el.closest('.stat-item');
        el.textContent = newVal;
        if (parent) {
            parent.classList.add('updated');
            setTimeout(() => parent.classList.remove('updated'), 1200);
        }
    }

    function updateAdsProgressBar(current) {
        const total = 10;   // daily limit
        const pct = Math.min((current / total) * 100, 100);
        const progressFill = document.getElementById('adsProgress');
        if (progressFill) progressFill.style.width = pct + '%';
        const remainingSpan = document.getElementById('adsRemaining');
        if (remainingSpan) remainingSpan.textContent = `Watched ${current}/${total} · +30-50 Coins each`;
        const adDisplay = document.getElementById('adDisplay');
        if (adDisplay) adDisplay.textContent = current;
    }

    function setupAdsUI() {
        const isSunday = CONFIG.mode === 'sunday';
        const titleEl = document.getElementById('adsTitle');
        if (titleEl) titleEl.textContent = isSunday ? '🏆 Sunday Tournament Ads' : '📺 Daily Ads • Earn 30-50 Coins';
    }

    // ============================================================
    //  CORE ADS LOGIC: RED BUTTON -> Monetag show_10959015()
    // ============================================================
    let isAdInProgress = false;
    const watchBtn = document.getElementById('watchAdsMainBtn');

    // Bind click event
    if (watchBtn) {
        watchBtn.addEventListener('click', async () => {
            if (isAdInProgress) {
                showAdStatus("Please wait, ad is already playing.", "info");
                return;
            }
            // Optional: check daily limit before even showing ad?
            // but we let backend handle limit; we just show ad first.
            isAdInProgress = true;
            watchBtn.disabled = true;
            showAdStatus("Loading premium ad... please wait.", "info");

            try {
                // Call Monetag rewarded interstitial (provided by the external script)
                // The function show_10959015() returns a Promise that resolves when user watches full ad & closes.
                if (typeof window.show_10959015 === 'function') {
                    await window.show_10959015();
                    // Ad fully watched and closed by user (X clicked)
                    showAdStatus("Ad completed! Earning coins...", "success");
                    // Trigger coin flying animation (from button to coin box)
                    triggerCoinFlyingAnimation();
                } else {
                    throw new Error("Monetag SDK not ready. Please refresh.");
                }
            } catch (err) {
                console.error("Ad error:", err);
                showAdStatus("Ad error or skipped. Please try again.", "error");
                isAdInProgress = false;
                if (watchBtn) watchBtn.disabled = false;
            }
        });
    }

    // ============================================================
    // FLYING COINS ANIMATION (from button to top coin box)
    // ============================================================
    function triggerCoinFlyingAnimation() {
        const button = document.getElementById('watchAdsMainBtn');
        const targetBox = document.getElementById('coinStat');  // the whole stat card
        if (!button || !targetBox) {
            // fallback: directly sync
            syncEarnedCoins();
            return;
        }

        const btnRect = button.getBoundingClientRect();
        const targetRect = targetBox.getBoundingClientRect();
        const startX = btnRect.left + btnRect.width / 2;
        const startY = btnRect.top + btnRect.height / 2;
        const endX = targetRect.left + targetRect.width / 2;
        const endY = targetRect.top + targetRect.height / 2;

        const coinCount = Math.floor(Math.random() * 4) + 12; // 12 to 15 coins
        let finishedAnimations = 0;

        for (let i = 0; i < coinCount; i++) {
            const coin = document.createElement('div');
            coin.classList.add('flying-coin');
            coin.innerHTML = '🪙';
            // random horizontal drift and vertical arc
            const rx = (Math.random() - 0.5) * 40;   // -20px to 20px
            const ry = (Math.random() - 0.5) * 30 - 20;
            const tx = endX - startX + (Math.random() - 0.5) * 25;
            const ty = endY - startY - 40 + (Math.random() * 30);
            coin.style.setProperty('--rx', rx + 'px');
            coin.style.setProperty('--ry', ry + 'px');
            coin.style.setProperty('--tx', tx + 'px');
            coin.style.setProperty('--ty', ty + 'px');
            coin.style.left = startX + 'px';
            coin.style.top = startY + 'px';
            document.body.appendChild(coin);

            const animDuration = 1.2 + Math.random() * 0.3;
            coin.style.animation = `flyUpCoin ${animDuration}s ease-out forwards`;

            coin.addEventListener('animationend', () => {
                coin.remove();
                finishedAnimations++;
                if (finishedAnimations === coinCount) {
                    // all coins vanished → now sync with backend
                    syncEarnedCoins();
                }
            });
        }
        // safety: if no coins created (edge case) still sync after 1.5s
        if (coinCount === 0) setTimeout(() => syncEarnedCoins(), 1500);
    }

    // ============================================================
    // SYNC EARNED COINS: POST to /api/reward
    // ============================================================
    async function syncEarnedCoins() {
        if (!CONFIG.userId) {
            showAdStatus("User ID missing. Cannot credit.", "error");
            resetAdButton();
            return;
        }
        // Generate random reward between 30 and 50
        const rewardAmount = Math.floor(Math.random() * 21) + 30; // 30-50 inclusive

        try {
            const response = await fetch(`${BACKEND_URL}/api/reward`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: CONFIG.userId,
                    coins: rewardAmount,
                    type: 'ad'         // standard daily ad (monday-saturday)
                })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                // SUCCESS: update UI counters immediately
                const newCoins = data.totalCoins;
                const newAdCount = data.dailyAdsViewed ?? data.sundayAdsCount ?? 0;
                animateStat('coinDisplay', newCoins);
                animateStat('adDisplay', newAdCount);
                updateAdsProgressBar(newAdCount);
                // Show beautiful popup with reward
                showPopup(rewardAmount, false);
                showAdStatus(`🎉 +${rewardAmount} coins credited!`, "success");
            } else {
                // Error (daily limit reached, etc.)
                let errMsg = data.error || "Reward failed. Limit reached or server issue.";
                if (errMsg.toLowerCase().includes('limit')) {
                    errMsg = "Daily ad limit reached! Come back tomorrow.";
                }
                showAdStatus(`⚠️ ${errMsg}`, "error");
                // still reset button but no coins added
            }
        } catch (err) {
            console.error("syncEarnedCoins error:", err);
            showAdStatus("Network error. Coins not credited. Please retry.", "error");
        } finally {
            resetAdButton();
        }
    }

    function resetAdButton() {
        isAdInProgress = false;
        if (watchBtn) {
            watchBtn.disabled = false;
        }
        // auto-hide status after 4 seconds
        setTimeout(() => {
            const msgDiv = document.getElementById('adStatusMsg');
            if (msgDiv && msgDiv.style.display !== 'none') {
                msgDiv.style.display = 'none';
            }
        }, 5000);
    }

    function showAdStatus(msg, type) {
        const el = document.getElementById('adStatusMsg');
        if (!el) return;
        el.textContent = msg;
        el.className = `status-msg ${type}`;
        el.style.display = 'block';
    }

    // ========== SPIN WHEEL FUNCTIONS (PRESERVED & INTACT) ==========
    function setupSpinWheel() {
        spinCanvas = document.getElementById('spinCanvas');
        spinCtx = spinCanvas.getContext('2d');
        drawWheel(0);
    }

    function drawWheel(rotation) {
        const c = spinCanvas;
        const cx = spinCtx;
        const W = c.width, H = c.height;
        const centerX = W / 2, centerY = H / 2;
        const radius = W / 2 - 10;
        const segs = currentSegments;
        const angPer = (2 * Math.PI) / segs.length;

        cx.clearRect(0, 0, W, H);
        segs.forEach((seg, i) => {
            const sA = rotation + i * angPer;
            const eA = sA + angPer;
            cx.beginPath();
            cx.moveTo(centerX, centerY);
            cx.arc(centerX, centerY, radius, sA, eA);
            cx.closePath();
            const grad = cx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            grad.addColorStop(0.2, seg.color + 'cc');
            grad.addColorStop(1, '#0B0B1E');
            cx.fillStyle = grad;
            cx.fill();
            cx.strokeStyle = '#0B0B1E';
            cx.lineWidth = 2;
            cx.stroke();
            cx.save();
            cx.translate(centerX, centerY);
            cx.rotate(sA + angPer / 2);
            cx.textAlign = 'right';
            cx.fillStyle = '#ffffff';
            cx.font = 'bold 17px "Courier New", monospace';
            cx.shadowColor = seg.color;
            cx.shadowBlur = 8;
            cx.fillText(seg.label, radius - 22, 7);
            cx.restore();
        });
        const hub = cx.createRadialGradient(centerX, centerY, 4, centerX, centerY, 28);
        hub.addColorStop(0, '#ffffff');
        hub.addColorStop(1, '#0B0B1E');
        cx.beginPath();
        cx.arc(centerX, centerY, 28, 0, 2 * Math.PI);
        cx.fillStyle = hub;
        cx.fill();
        cx.strokeStyle = '#00f3ff';
        cx.lineWidth = 3;
        cx.stroke();
        cx.fillStyle = '#00f3ff';
        cx.font = 'bold 13px "Courier New", monospace';
        cx.textAlign = 'center';
        cx.fillText('SPIN', centerX, centerY + 5);
    }

    function updateStreakUI() {
        const streak = CONFIG.streak;
        const dayNum = Math.min((streak % 7) + 1, 7);
        const pct = (dayNum / 7) * 100;
        const progEl = document.getElementById('streakProgress');
        if (progEl) progEl.style.width = pct + '%';
        const infoEl = document.getElementById('streakInfo');
        if (infoEl) infoEl.textContent = `🔥 Streak: Day ${dayNum} of 7${CONFIG.spinMode === 'mega' ? ' — MEGA SPIN! 🌟' : ''}`;
        const streakDisplay = document.getElementById('streakDisplay');
        if (streakDisplay) streakDisplay.textContent = streak;
    }

    async function submitReward(type, coins, onSuccess, onError) {
        if (!CONFIG.userId) { onError('No user ID'); return; }
        try {
            const res = await fetch(`${BACKEND_URL}/api/reward`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: CONFIG.userId, coins, type })
            });
            const data = await res.json();
            if (res.ok && data.success) onSuccess(data);
            else onError(data.error || 'server error');
        } catch (e) { onError('Network error'); }
    }

    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        const btn = document.getElementById('spinButton');
        btn.disabled = true;
        btn.textContent = '🌀 SPINNING...';
        const segs = currentSegments;
        const angPer = 360 / segs.length;
        const winIdx = Math.floor(Math.random() * segs.length);
        const fullSpins = 5 + Math.floor(Math.random() * 4);
        const totalDeg = fullSpins * 360 + winIdx * angPer + angPer / 2;
        const totalRad = totalDeg * (Math.PI / 180);
        const startRot = currentRotation;
        const duration = 4200 + Math.random() * 1800;
        const startTime = performance.now();
        function animate(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const angle = startRot + totalRad * eased;
            drawWheel(angle);
            if (progress < 1) requestAnimationFrame(animate);
            else {
                currentRotation = angle;
                const norm = ((angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                let segIdx = Math.floor(((2 * Math.PI - norm) / (2 * Math.PI)) * segs.length) % segs.length;
                if (segIdx < 0) segIdx += segs.length;
                const winner = segs[segIdx];
                submitReward('spin', winner.value, (data) => {
                    animateStat('coinDisplay', data.totalCoins);
                    animateStat('streakDisplay', data.spinStreak);
                    showPopup(winner.value, CONFIG.spinMode === 'mega');
                    btn.disabled = false;
                    btn.textContent = '🎰 SPIN NOW';
                    isSpinning = false;
                    CONFIG.streak = data.spinStreak;
                    updateStreakUI();
                }, (err) => {
                    showStatus('spinStatus', '❌ ' + err, 'error');
                    btn.disabled = false;
                    btn.textContent = '🎰 SPIN NOW';
                    isSpinning = false;
                });
            }
        }
        requestAnimationFrame(animate);
    }

    function showPopup(amount, isMega) {
        const popup = document.getElementById('resultPopup');
        const emojiSpan = document.getElementById('resultEmoji');
        const amountSpan = document.getElementById('resultAmount');
        const msgSpan = document.getElementById('resultMsg');
        if (emojiSpan) emojiSpan.textContent = isMega ? '🔥' : '🎉';
        if (amountSpan) amountSpan.textContent = '+' + amount;
        if (msgSpan) msgSpan.textContent = isMega ? 'MEGA SPIN COINS!' : 'COINS EARNED!';
        if (popup) popup.classList.add('show');
        const overlayEl = document.getElementById('overlay');
        if (overlayEl) overlayEl.classList.add('show');
    }

    function closePopup() {
        const popup = document.getElementById('resultPopup');
        const overlayEl = document.getElementById('overlay');
        if (popup) popup.classList.remove('show');
        if (overlayEl) overlayEl.classList.remove('show');
    }

    function showStatus(id, msg, type) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = msg;
        el.className = `status-msg ${type}`;
        el.style.display = 'block';
        setTimeout(() => { if (el) el.style.display = 'none'; }, 5000);
    }

    // expose for global button (spin)
    window.startSpin = startSpin;
    window.closePopup = closePopup;
</script>
</body>
</html>
